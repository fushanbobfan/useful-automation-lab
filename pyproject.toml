[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "useful-automation-lab"
version = "0.1.0"
description = "Safe, inspectable utilities for repetitive local tasks"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.scripts]
file-inventory = "useful_automation_lab.inventory:main"

[tool.setuptools.packages.find]
where = ["src"]

